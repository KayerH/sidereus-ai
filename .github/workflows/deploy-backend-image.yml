name: Build Backend Image

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-image.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-image
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check image configuration
        run: |
          missing=0
          for name in ALIYUN_REGISTRY ALIYUN_NAMESPACE ALIYUN_IMAGE_NAME; do
            if [ -z "${!name}" ]; then
              echo "Repository variable $name is required."
              missing=1
            fi
          done
          if [ -z "${ALIYUN_REGISTRY_USERNAME}" ]; then
            echo "Repository secret ALIYUN_REGISTRY_USERNAME is required."
            missing=1
          fi
          if [ -z "${ALIYUN_REGISTRY_PASSWORD}" ]; then
            echo "Repository secret ALIYUN_REGISTRY_PASSWORD is required."
            missing=1
          fi
          exit "$missing"
        env:
          ALIYUN_REGISTRY: ${{ vars.ALIYUN_REGISTRY }}
          ALIYUN_NAMESPACE: ${{ vars.ALIYUN_NAMESPACE }}
          ALIYUN_IMAGE_NAME: ${{ vars.ALIYUN_IMAGE_NAME }}
          ALIYUN_REGISTRY_USERNAME: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and push backend image
        env:
          ALIYUN_REGISTRY: ${{ vars.ALIYUN_REGISTRY }}
          ALIYUN_NAMESPACE: ${{ vars.ALIYUN_NAMESPACE }}
          ALIYUN_IMAGE_NAME: ${{ vars.ALIYUN_IMAGE_NAME }}
        run: |
          IMAGE="${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/${ALIYUN_IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build \
            -f backend/Dockerfile \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${SHORT_SHA}" \
            backend
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${SHORT_SHA}"
